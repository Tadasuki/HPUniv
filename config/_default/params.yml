########################################
# Experimental features
########################################

# Inject code snippet
# Make sure your code snippet is safeHTML
injector:
  head_begin: # Inject code snippet right after <head>
  head_end: |-
    <style>
      /* ── Smooth page transitions ──────────────────────────────────── */

      /* Initial load: entire #wrap fades up once */
      @keyframes reimu-page-enter {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
      #wrap {
        animation: reimu-page-enter 0.38s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Page loading blur effect */
      #wrap.pjax-loading {
        filter: blur(10px);
        opacity: 0.7;
        transform: scale(0.99);
      }
      #wrap {
        transition: filter 0.4s ease, opacity 0.4s ease, transform 0.4s ease, background-color 0.35s ease, background 0.35s ease;
      }

      /* PJAX content swap: #content slides up smoothly */
      @keyframes reimu-content-enter {
        from { opacity: 0; transform: translateY(8px); filter: blur(5px); }
        to   { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      #content.pjax-entering {
        animation: reimu-content-enter 0.32s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* PJAX content exit: #content fades out downward before swap */
      @keyframes reimu-content-exit {
        from { opacity: 1; transform: translateY(0); filter: blur(0); }
        to   { opacity: 0; transform: translateY(-6px); filter: blur(5px); }
      }
      #content.pjax-exiting {
        animation: reimu-content-exit 0.18s ease-in both;
      }

      /* Prevent #wrap from re-running its animation on PJAX navigations */
      #wrap.pjax-active {
        animation: none;
      }

      /* ── Hardware-Accelerated Page Blur Overlay ── */
      /* Animating filter: blur on huge containers causes massive frame drops. 
         Instead, we use a full-screen overlay with a static backdrop-filter and animate its opacity. */
      #pjax-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(255, 250, 253, 0.3);
        backdrop-filter: blur(12px) saturate(120%);
        -webkit-backdrop-filter: blur(12px) saturate(120%);
        opacity: 0;
        pointer-events: none;
        z-index: 9998;
        transition: opacity 0.35s ease;
      }
      [data-theme="dark"] #pjax-overlay {
        background: rgba(30, 24, 48, 0.3);
      }
      #pjax-overlay.active {
        opacity: 1;
        pointer-events: auto; /* block interactions while loading */
      }

      /* ── Cute PJAX Loader ─────────────────────────────────────────── */
      #pjax-cute-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 16px 32px;
        border-radius: 50px;
        box-shadow: 0 8px 32px rgba(100, 72, 140, 0.2);
        display: flex;
        align-items: center;
        gap: 14px;
        opacity: 0;
        transform: translate(-50%, calc(-50% + 20px)) scale(0.9);
        pointer-events: none;
        transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: 9999;
        font-weight: 700;
        color: var(--red-1);
      }
      [data-theme="dark"] #pjax-cute-loader {
        background: rgba(30, 24, 48, 0.85);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      #pjax-cute-loader.active {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    </style>
  body_begin: # Inject code snippet right after <body>
  body_end: |-
    <script>
      /* ── PJAX smooth transition & Cute loader controller ─────────── */
      (function () {
        try {
          /* Inject the blur overlay and the Loading text safely */
          if (!document.getElementById('pjax-overlay')) {
            var loaderHtml = '<div id="pjax-overlay"></div><div id="pjax-cute-loader"><span style="font-size:16px; letter-spacing: 2px;">Loading...</span></div>';
            document.body.insertAdjacentHTML('beforeend', loaderHtml);
          }

          var wrap       = document.getElementById('wrap');
          
          /* Mark #wrap so its entrance animation doesn't replay on PJAX */
          if (wrap && !wrap.hasAttribute('data-pjax-anim-bound')) {
            wrap.setAttribute('data-pjax-anim-bound', 'true');
            wrap.addEventListener('animationend', function () {
              wrap.classList.add('pjax-active');
            }, { once: true });
          }

          /* Clean up old listeners from live-reloads */
          if (window.__pjaxSendHandler) {
            document.removeEventListener('pjax:send', window.__pjaxSendHandler);
            document.removeEventListener('pjax:complete', window.__pjaxCompleteHandler);
          }

          window.__pjaxSendHandler = function () {
            try {
              /* Only show the loading overlay if we are explicitly switching languages */
              if (window.isLangSwitch) {
                var pjaxOverlay = document.getElementById('pjax-overlay');
                var cuteLoader = document.getElementById('pjax-cute-loader');
                if (pjaxOverlay) pjaxOverlay.classList.add('active');
                if (cuteLoader) cuteLoader.classList.add('active');
              }
              
              var content = document.getElementById('content');
              if (content) {
                content.classList.remove('pjax-entering');
                content.classList.add('pjax-exiting');
              }
            } catch (e) { console.error("Error in pjax:send handler", e); }
          };

          window.__pjaxCompleteHandler = function () {
            try {
              /* Always ensure overlay is hidden on completion */
              var pjaxOverlay = document.getElementById('pjax-overlay');
              var cuteLoader = document.getElementById('pjax-cute-loader');
              if (pjaxOverlay) pjaxOverlay.classList.remove('active');
              if (cuteLoader) cuteLoader.classList.remove('active');
              
              /* Reset the flag to prevent accidental triggering on next normal PJAX */
              window.isLangSwitch = false;
                
              var content = document.getElementById('content');
              if (content) {
                content.classList.remove('pjax-exiting');
                /* rAF ensures the class change triggers a fresh animation */
                requestAnimationFrame(function () {
                  requestAnimationFrame(function () {
                    content.classList.add('pjax-entering');
                    content.addEventListener('animationend', function () {
                      content.classList.remove('pjax-entering');
                    }, { once: true });
                  });
                });
              }
            } catch (e) { console.error("Error in pjax:complete handler", e); }
          };

          document.addEventListener('pjax:send', window.__pjaxSendHandler);
          document.addEventListener('pjax:complete', window.__pjaxCompleteHandler);
        } catch(e) { console.error("Error initializing PJAX loader", e); }
      })();
    </script>

        "rgb(47,34,55)",
        "rgb(90,63,104)",
        "rgb(115,80,103)",
        "rgb(216,167,190)",
        "rgb(232,197,215)",
        "rgb(240,221,235)"
        ]
        number: 18
        duration: [1200, 1800]
        shapeOptions:
          radius: [6, 12]
          alpha: [0.7, 0.9]
      - shape: circle
        move: ["diffuse"]
        easing: easeOutExpo
        colors: ["rgb(90,63,104)"]
        number: 1
        duration: [1200, 1800]
        shapeOptions:
          radius: 20
          alpha: [0.2, 0.5]
          lineWidth: 6

